<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受講システム｜PCサロン Sola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique&display=swap" rel="stylesheet">
<style>
  :root {
    --color-text: #1A1A1A;
    --color-text-sub: #6B6B6B;
    --color-border: #1A1A1A;
    --color-border-light: #D8D8D8;
    --font-serif: "游明朝", "Yu Mincho", "ヒラギノ明朝 ProN", serif;
    --font-sans: "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    color: var(--color-text);
    background: #FFFFFF;
    line-height: 1.8;
    font-size: 15px;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  header {
    border-bottom: 2px solid #2a6db5;
    padding: 20px 24px 6px;
    width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
  }

  .site-name {
    font-family: "Zen Antique", serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--color-text);
    text-decoration: none;
    display: block;
    line-height: 1;
    text-align: center;
  }

  .site-tagline {
    font-family: "Zen Antique", serif;
    font-size: 12px;
    color: var(--color-text-sub);
    letter-spacing: 0.08em;
    line-height: 1;
    margin-top: 6px;
    margin-bottom: 3px;
    text-align: center;
  }

  nav {
    padding: 18px 24px 0;
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  nav a {
    font-family: "游ゴシック", "Yu Gothic", "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 400;
    font-size: 17px;
    letter-spacing: 0.05em;
    color: var(--color-text);
    text-decoration: none;
  }

  nav a:hover { color: var(--color-text-sub); }
  nav a.active { border-bottom: 1px solid var(--color-text); padding-bottom: 2px; }

  @media (max-width: 600px) {
    nav { gap: 10px 16px; padding: 16px 16px 0; }
    nav a { font-size: 13px; }
  }

  .page-title {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--color-border-light);
    margin-bottom: 40px;
  }

  .page-title h1 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.08em;
  }

  .content {
    padding-bottom: 80px;
  }

  .section {
    margin-bottom: 48px;
  }

  .section h2 {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .section p {
    font-size: 15px;
    line-height: 1.9;
    margin-bottom: 12px;
  }

  .table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }

  .table th,
  .table td {
    text-align: left;
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .table th {
    color: var(--color-text-sub);
    font-weight: 400;
    width: 36%;
  }
</style>
</head>
<body>

<div class="page">

  <header>
    <a href="index.html" class="site-name">PCサロン Sola</a>
    <p class="site-tagline">知を愛する大人のための教室</p>
  </header>

  <nav>
    <a href="index.html">HOME</a>
    <a href="learn.html">学べる事</a>
    <a href="courses.html" class="active">受講システム</a>
    <a href="voices.html">声</a>
    <a href="access.html">アクセス</a>
    <a href="contact.html">お問い合わせ</a>
  </nav>

  <div class="page-title">
    <h1>受講システム</h1>
  </div>

  <div class="content">

    <div class="section">
      <h2>受講の流れ</h2>
      <p>まずはお気軽にお問い合わせください。体験レッスン（無料）を受けていただいた後、ご希望のコースをお選びいただけます。</p>
    </div>

    <div class="section">
      <h2>料金</h2>
      <table class="table">
        <tr><th>入会金</th><td>※お問い合わせください</td></tr>
        <tr><th>月謝</th><td>※お問い合わせください</td></tr>
        <tr><th>体験レッスン</th><td>無料</td></tr>
      </table>
    </div>

    <div class="section">
      <h2>授業について</h2>
      <table class="table">
        <tr><th>形式</th><td>少人数制・個別対応</td></tr>
        <tr><th>対象</th><td>主に65歳以上のシニアの方</td></tr>
        <tr><th>場所</th><td>広島市内（詳しくはアクセスをご覧ください）</td></tr>
      </table>
    </div>

  </div>

</div>

</body>
</html>
