<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学べる事｜PCサロン Sola</title>
<style>
  :root {
    --color-text: #1A1A1A;
    --color-text-sub: #6B6B6B;
    --color-border: #1A1A1A;
    --color-border-light: #D8D8D8;
    --font-serif: "游明朝", "Yu Mincho", "ヒラギノ明朝 ProN", serif;
    --font-sans: "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    color: var(--color-text);
    background: #FFFFFF;
    line-height: 1.8;
    font-size: 15px;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  header {
    border-bottom: 2px solid var(--color-border);
    padding: 20px 24px;
    width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
  }

  .site-name {
    font-family: "游ゴシック", "Yu Gothic", "ヒラギノ角ゴ ProN", sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--color-text);
    text-decoration: none;
    display: inline-block;
  }

  nav {
    padding: 18px 24px 0;
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  nav a {
    font-family: "游ゴシック", "Yu Gothic", "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 400;
    font-size: 17px;
    letter-spacing: 0.05em;
    color: var(--color-text);
    text-decoration: none;
  }

  nav a:hover { color: var(--color-text-sub); }
  nav a.active { border-bottom: 1px solid var(--color-text); padding-bottom: 2px; }

  @media (max-width: 600px) {
    nav { gap: 10px 16px; padding: 16px 16px 0; }
    nav a { font-size: 13px; }
  }

  .page-title {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--color-border-light);
    margin-bottom: 40px;
  }

  .page-title h1 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.08em;
  }

  .content {
    padding-bottom: 80px;
  }

  .section {
    margin-bottom: 48px;
  }

  .section h2 {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .section p {
    font-size: 15px;
    line-height: 1.9;
    color: var(--color-text);
    margin-bottom: 12px;
  }

  .section ul {
    list-style: none;
    margin-top: 8px;
  }

  .section ul li {
    font-size: 15px;
    line-height: 1.9;
    padding: 6px 0;
    border-bottom: 1px solid var(--color-border-light);
    display: flex;
    gap: 16px;
  }

  .section ul li::before {
    content: "—";
    color: var(--color-text-sub);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="page">

  <header>
    <a href="index.html" class="site-name">PCサロン Sola</a>
  </header>

  <nav>
    <a href="index.html">HOME</a>
    <a href="learn.html" class="active">学べる事</a>
    <a href="courses.html">受講システム</a>
    <a href="voices.html">声</a>
    <a href="access.html">アクセス</a>
    <a href="contact.html">お問い合わせ</a>
  </nav>

  <div class="page-title">
    <h1>学べる事</h1>
  </div>

  <div class="content">

    <div class="section">
      <h2>パソコンの基本操作</h2>
      <ul>
        <li>マウス・キーボードの使い方</li>
        <li>Windowsの基本操作</li>
        <li>ファイルの保存・整理</li>
        <li>インターネットの使い方</li>
        <li>メールの送受信</li>
      </ul>
    </div>

    <div class="section">
      <h2>文書・表計算</h2>
      <ul>
        <li>Word（文書作成）</li>
        <li>Excel（表計算・家計簿）</li>
        <li>写真の整理・印刷</li>
      </ul>
    </div>

    <div class="section">
      <h2>スマートフォン</h2>
      <ul>
        <li>スマホの基本操作</li>
        <li>LINE・メールの使い方</li>
        <li>写真の撮り方・送り方</li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
