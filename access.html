<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクセス｜PCサロン Sola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">
<style>
  :root {
    --color-text: #1A1A1A;
    --color-text-sub: #6B6B6B;
    --color-border: #1A1A1A;
    --color-border-light: #D8D8D8;
    --font-serif: "游明朝", "Yu Mincho", "ヒラギノ明朝 ProN", serif;
    --font-sans: "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    color: var(--color-text);
    background: #FFFFFF;
    line-height: 1.8;
    font-size: 15px;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  header {
    border-bottom: 2px solid #2a6db5;
    padding: 20px 24px 6px;
    width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
  }

  .site-name {
    font-family: "Noto Serif JP", serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--color-text);
    text-decoration: none;
    display: block;
    line-height: 1;
    text-align: center;
  }

  .site-tagline {
    font-family: "Noto Serif JP", serif;
    font-size: 12px;
    color: var(--color-text-sub);
    letter-spacing: 0.08em;
    line-height: 1;
    margin-top: 6px;
    margin-bottom: 3px;
    text-align: center;
  }

  nav {
    padding: 18px 24px 0;
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  nav a {
    font-family: "游ゴシック", "Yu Gothic", "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 400;
    font-size: 17px;
    letter-spacing: 0.05em;
    color: var(--color-text);
    text-decoration: none;
  }

  nav a:hover { color: var(--color-text-sub); }
  nav a.active { border-bottom: 1px solid var(--color-text); padding-bottom: 2px; }

  @media (max-width: 600px) {
    nav { gap: 10px 16px; padding: 16px 16px 0; }
    nav a { font-size: 13px; }
  }

  .page-title {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--color-border-light);
    margin-bottom: 40px;
  }

  .page-title h1 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.08em;
  }

  .content {
    padding-bottom: 80px;
  }

  .table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 48px;
  }

  .table th,
  .table td {
    text-align: left;
    padding: 14px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .table th {
    color: var(--color-text-sub);
    font-weight: 400;
    width: 36%;
  }

  .map-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--color-border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-sub);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .map-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div class="page">

  <header>
    <a href="index.html" class="site-name">PCサロン Sola</a>
    <p class="site-tagline">知を愛する大人のための教室</p>
  </header>

  <nav>
    <a href="index.html">HOME</a>
    <a href="learn.html">学べる事</a>
    <a href="courses.html">受講システム</a>
    <a href="voices.html">声</a>
    <a href="access.html" class="active">アクセス</a>
    <a href="contact.html">お問い合わせ</a>
  </nav>

  <div class="page-title">
    <h1>アクセス</h1>
  </div>

  <div class="content">

    <table class="table">
      <tr><th>教室名</th><td>PCサロン Sola</td></tr>
      <tr><th>所在地</th><td>広島市（詳細はお問い合わせください）</td></tr>
      <tr><th>電話</th><td>※お問い合わせフォームをご利用ください</td></tr>
      <tr><th>営業時間</th><td>※お問い合わせください</td></tr>
      <tr><th>定休日</th><td>※お問い合わせください</td></tr>
    </table>

    <div class="map-wrap">
      <p>地図はここに掲載予定です</p>
    </div>

  </div>

</div>

</body>
</html>
